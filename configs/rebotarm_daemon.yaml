arm_config: configs/rebotarm/arm.yaml   # provided by reBotArm_control_py user setup
zmq_address: tcp://*:5558
control_rate_hz: 500
# Optional: world gravity expressed in the arm's base frame, m/s².
# Default (omit this line) is [0.0, 0.0, -9.81] = upright/flat mount
# (base +z = world up, base +x = forward, base +y = left).
# For tilted mounts, rotate world gravity into the base frame and put
# the result here. Examples:
#   45° tilt to the right (about base +x) → [0.0, -6.937, -6.937]
#   45° tilt forward       (about base +y) → [+6.937, 0.0, -6.937]
gravity_in_base: [-6.937, 0.0, -6.937]   # 右 45° 傾斜マウント (manual verification)
safety:
  joint_pos_min_rad: [-3.14, -3.14, -3.14, -3.14, -3.14, -3.14]
  joint_pos_max_rad: [3.14, 3.14, 3.14, 3.14, 3.14, 3.14]
  # Smoothing clamps applied per-tick to incoming send_joint_command
  # targets. Hand-teach recordings have jerky frames that the daemon
  # ramps down to physical motion limits — the actual arm never sees a
  # raw target that exceeds these. Bump if replay tracks too sluggishly,
  # lower for stricter safety. ~12 rad/s ≈ 690 °/s, comfortably above
  # the ~11 rad/s peaks we see in fast hand-teach motion.
  joint_vel_max_rad_s: 12.0
  joint_accel_max_rad_s2: 100.0
  torque_max_nm: [10, 10, 8, 5, 5, 3]
  temperature_warn_c: 70
  temperature_fault_c: 80
  temperature_recover_c: 60
  heartbeat_timeout_ms: 500
# Pure-compliance hand-teaching gains (mirrors data_collect/11_gravity_compensation_record.py).
# kp=0 leaves the arm fully free; per-joint kd damps oscillation, with
# higher values on the proximal 4340P joints (1-3) which carry more
# reflected inertia. Tune kd up if the arm "flies" when released, down
# if it feels too heavy to push.
gravity_comp:
  kp: [0, 0, 0, 0, 0, 0]
  kd: [0.6, 0.6, 0.8, 0.6, 0.5, 0.0]
  # Per-joint Coulomb friction compensation: tau += friction_tau_nm[i] *
  # sign(qdot[i]) once |qdot[i]| > vel_deadband_rad_s. Cancels reducer
  # stiction so the arm feels light when back-driven. Bump the proximal
  # 4340P entries (1-3) up if the joint still feels sticky; keep distal
  # 4310 entries (4-6) low — they have less reduction. All zeros disables.
  friction_tau_nm: [0.9, 0.3, 0.85, 0.2, 0.2, 0.0]
  vel_deadband_rad_s: [0.05, 0.05, 0.075, 0.075, 0.075, 0.02]
  # Linear taper on the Coulomb comp:
  #   tau_friction = friction_tau_nm[i] * sign(qdot) * max(0, 1 - |qdot|/v_taper[i])
  # 低速 (|qdot| ≪ v_taper) ではフル補償で初動の軽さを維持し、|qdot| が
  # v_taper に近付くと補償が 0 に減衰するので「手を離した後に friction
  # comp が押し続けて飛ぶ」runaway を構造的に殺す。各関節 0 で無効。
  # 既定値: 4340P (proximal joint1-3) は反射慣性が大きく runaway 終端
  # 速度も高いので 1.5 rad/s。4310 (distal joint4-5) は 1.0 rad/s。
  # joint6 は friction_tau_nm=0 なのでタイパー値は無関係。
  friction_vel_taper_rad_s: [1.5, 1.5, 1.5, 1.0, 1.0, 0.0]

# Position-tracking gains for replay / teleop. Motors stay in MIT mode;
# POSITION is just MIT with strong kp + tau_g. Defaults mirror arm.yaml's
# MIT.kp/kd (120/8 for 4340P, 18/2 for 4310). Tune up for tighter
# tracking, down for softer landing.
position:
  kp: [120, 120, 120, 18, 18, 18]
  kd: [8, 8, 8, 2, 2, 2]

# Optional gripper sharing the arm's bus (motor 0x07 on the same
# /dev/ttyACM0). Remove this section to disable the gripper entirely.
# friction_tau_nm: torque applied in the velocity direction once velocity
# crosses vel_deadband_rad_s, to overcome static friction. Increase if
# the gripper still feels sticky; decrease if it drifts on its own.
gripper:
  cfg_path: configs/rebotarm/gripper.yaml
  # Compliance-mode gains (active in GRAVITY_COMP)
  kd: 0.0
  friction_tau_nm: 0.10
  vel_deadband_rad_s: 0.10
  control_rate_hz: 100
  # Constant feed-forward torque applied in compliance mode on top of
  # friction comp. Sign picks the direction — set positive or negative
  # depending on which way is "open" for the gripper hardware. Start
  # small (e.g. 0.02-0.05 Nm); too large will overpower friction comp
  # and drive the gripper hard against its open-side stop. 0.0 disables.
  open_bias_tau_nm: -0.05
  # Position-mode gains (active in POSITION while a target is set via
  # CMD_SEND_GRIPPER_COMMAND — i.e., during replay/teleop). Default to
  # the gripper.yaml MIT defaults shipped with reBotArm_control_py.
  position_kp: 8.0
  position_kd: 1.0
