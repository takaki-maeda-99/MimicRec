_target_: mimicrec.adapters.so101.SO101Adapter
port: /dev/ttyACM4
id: my_arm
replay:
  ramp_duration_sec: 2
  max_joint_velocity: 720
  max_joint_acceleration: 30000
  max_joint_position_jump: 80
  command_timeout_sec: 0.2
  watchdog_hz: 20
kinematics:
  urdf_path: configs/urdf/so101/so101.urdf
  target_frame: gripper_frame_link
  joint_names:
  - shoulder_pan
  - shoulder_lift
  - elbow_flex
  - wrist_flex
  - wrist_roll
inference_safety:
  max_joint_delta_per_step_deg: 2
  slow_stop_ticks: 5
  joint_limits_deg:
    shoulder_pan:
    - -180
    - 180
    shoulder_lift:
    - -110
    - 110
    elbow_flex:
    - -110
    - 110
    wrist_flex:
    - -110
    - 110
    wrist_roll:
    - -180
    - 180
