_target_: mimicrec.adapters.so101.SO101Adapter
port: /dev/ttyACM1
id: my_awesome_follower_arm
replay:
  ramp_duration_sec: 2
  max_joint_velocity: 720
  max_joint_acceleration: 30000
  max_joint_position_jump: 60
  command_timeout_sec: 0.2
  watchdog_hz: 20
kinematics:
  urdf_path: configs/urdf/so101/so101.urdf
  target_frame: gripper_frame_link
  joint_names:
  - shoulder_pan
  - shoulder_lift
  - elbow_flex
  - wrist_flex
  - wrist_roll
inference_safety:
  # REQUIRED for inference sessions; missing block → 400 at start_inference_session.
  # Conservative defaults — tighten as you validate against your VLA's chunks.
  max_joint_delta_per_step_deg: 2.0   # 30 deg/s at 15 fps
  slow_stop_ticks: 5                   # ~333 ms ramp at 15 fps
  joint_limits_deg:                    # required; inside URDF mechanical limits
    shoulder_pan: [-180.0, 180.0]
    shoulder_lift: [-110.0, 110.0]
    elbow_flex: [-110.0, 110.0]
    wrist_flex: [-110.0, 110.0]
    wrist_roll: [-180.0, 180.0]
