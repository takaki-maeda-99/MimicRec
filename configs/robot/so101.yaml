_target_: mimicrec.adapters.so101.SO101Adapter
port: /dev/ttyACM2
id: my_awesome_follower_arm
replay:
  ramp_duration_sec: 2
  max_joint_velocity: 1
  max_joint_acceleration: 5
  max_joint_position_jump: 0.3
  command_timeout_sec: 0.2
  watchdog_hz: 20
# Optional: enables EE pose columns in recordings via forward kinematics.
# Remove or comment out this block to disable EE recording.
kinematics:
  urdf_path: configs/urdf/so101/so101.urdf
  target_frame: gripper_frame_link
  joint_names: [shoulder_pan, shoulder_lift, elbow_flex, wrist_flex, wrist_roll]
