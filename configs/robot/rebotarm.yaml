_target_: mimicrec.adapters.rebotarm_zmq.ReBotArmZmqAdapter
address: tcp://localhost:5558
heartbeat_interval_ms: 200
request_timeout_ms: 1000
replay:
  ramp_duration_sec: 2
  # Watchdog thresholds — only abort replay on truly out-of-bounds
  # commands. Hand-teach recordings naturally contain jerks (quick
  # starts/stops) producing 50-100+ rad/s² spikes and 8-12 rad/s velocity
  # bursts on the proximal 4340P joints; tighter limits false-tripped on
  # ordinary recordings. The daemon's own clamps still smooth the command
  # before it reaches the motors, so the arm itself never sees these
  # spikes — the watchdog is the early-abort gate.
  # ``max_joint_position_jump`` is the tolerated gap between commanded
  # target and measured arm.
  # TEMP DIAG: limits relaxed ~3x to test if safety watchdog is the cause of
  # mid-replay aborts on fast "fold" motions. Revert these to (15.0, 200, 0.5)
  # once we know whether safety is what's tripping.
  max_joint_velocity: 45.0          # was 15.0
  max_joint_acceleration: 600       # was 200
  max_joint_position_jump: 1.5      # was 0.5
  command_timeout_sec: 0.2
  watchdog_hz: 20
# No `kinematics:` block needed — the daemon supplies EE pose directly
# in the read_state payload (RobotState.ee_*).
