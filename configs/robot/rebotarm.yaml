_target_: mimicrec.adapters.rebotarm_zmq.ReBotArmZmqAdapter
address: tcp://localhost:5558
heartbeat_interval_ms: 200
request_timeout_ms: 1000
replay:
  ramp_duration_sec: 2
  # Watchdog thresholds — only abort replay on truly out-of-bounds
  # commands. Hand-teach recordings naturally contain jerks (quick
  # starts/stops) that produce 50-100+ rad/s² instantaneous acceleration
  # samples; a 20 rad/s² limit false-tripped routinely. The daemon's own
  # clamps (joint_vel/accel_max in configs/rebotarm_daemon.yaml) still
  # smooth the command before it reaches the motors, so the arm itself
  # never sees these spikes — the watchdog is the early-abort gate.
  # ``max_joint_position_jump`` is the tolerated gap between commanded
  # target and measured arm.
  max_joint_velocity: 6.28
  max_joint_acceleration: 200
  max_joint_position_jump: 0.5
  command_timeout_sec: 0.2
  watchdog_hz: 20
# No `kinematics:` block needed — the daemon supplies EE pose directly
# in the read_state payload (RobotState.ee_*).
